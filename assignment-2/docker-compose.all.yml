services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - assignment2

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.java
    entrypoint: ["java", "-jar", "services/order-service/build/libs/order-service-0.0.1-SNAPSHOT.jar"]
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - assignment2

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile.java
    entrypoint: ["java", "-jar", "services/inventory-service/build/libs/inventory-service-0.0.1-SNAPSHOT.jar"]
    ports:
      - "8081:8081"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - assignment2

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.java
    entrypoint: ["java", "-jar", "services/notification-service/build/libs/notification-service-0.0.1-SNAPSHOT.jar"]
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - assignment2

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.java
    entrypoint: ["java", "-jar", "services/analytics-service/build/libs/analytics-service-0.0.1-SNAPSHOT.jar"]
    ports:
      - "8083:8083"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - assignment2

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - assignment2

networks:
  assignment2: