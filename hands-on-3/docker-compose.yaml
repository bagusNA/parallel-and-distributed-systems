networks:
  network_example:
    driver: bridge

services:
  mongodb-express-example:
    image: mongo-express:latest
    container_name: mongodb-express-example
    depends_on:
      - mongodb-example
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: myuser
      ME_CONFIG_MONGODB_ADMIN: myuser
      ME_CONFIG_MONGODB_SERVER: mongodb-example
      ME_CONFIG_MONGODB_URL: "mongodb-example:27017"
    networks:
      - network_example

  mongodb-example:
    image: mongo:latest
    container_name: mongodb-example
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: myuser
      MONGO_INITDB_ROOT_PASSWORD: myuser
      MONGO_INITDB_DATABASE: myuser
    networks:
      - network_example

