volumes:
  mongo-data1:
    name: mongo-data1
  mongo-data2:
    name: mongo-data2

services:
  mongodb-1:
    image: mongo:latest
    container_name: mongodb1
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: myadmin
      MONGO_INITDB_ROOT_PASSWORD: myadmin
      MONGO_INITDB_DATABASE: db
    volumes:
      - "./data-mongo1:/data/db"

  mongodb-2:
    image: mongo:latest
    container_name: mongodb2
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: myadmin
      MONGO_INITDB_ROOT_PASSWORD: myadmin
      MONGO_INITDB_DATABASE: db
    volumes:
      - type: bind
        source: "./data-mongo2"
        target: "/data/db"
        read_only: false
