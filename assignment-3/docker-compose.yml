      - "8011:8000"
    environment:
      - NODE_ID=queue_node_1
      - NODE_TYPE=queue_node
      - PORT=8000
      - CLUSTER_NODES=http://queue_node_1:8000,http://queue_node_2:8000,http://queue_node_3:8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

