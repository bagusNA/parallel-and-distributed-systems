      - NODE_ID=cache_node_1
      - NODE_TYPE=cache_node
      - PORT=8000
      - CLUSTER_NODES=http://cache_node_1:8000,http://cache_node_2:8000,http://cache_node_3:8000
      - REDIS_URL=redis://redis:6379/0
