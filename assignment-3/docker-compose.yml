version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  lock_node_1:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    ports:
      - "8001:8000"
    environment:
      - NODE_ID=node_1
      - NODE_TYPE=lock_manager
      - PORT=8000
      - CLUSTER_NODES=http://lock_node_1:8000,http://lock_node_2:8000,http://lock_node_3:8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  lock_node_2:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    ports:
      - "8002:8000"
    environment:
      - NODE_ID=node_2
      - NODE_TYPE=lock_manager
      - PORT=8000
      - CLUSTER_NODES=http://lock_node_1:8000,http://lock_node_2:8000,http://lock_node_3:8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  lock_node_3:
